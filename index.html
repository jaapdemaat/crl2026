<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GCD Community Resources — Network Graph</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #ffffff;
      color: #1a1a1a;
      font-family: 'Roboto', sans-serif;
      overflow: hidden;
    }
    #controls {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #111111;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 11px;
      color: #888;
      letter-spacing: 0.03em;
    }
    .toggle-container {
      display: inline-flex;
      align-self: flex-start;
      background: rgba(0,0,0,0.04);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.1);
    }
    .toggle-btn {
      padding: 8px 16px;
      font-family: 'Roboto', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: #999;
      background: transparent;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.02em;
    }
    .toggle-btn.active {
      color: #111;
      background: rgba(0,0,0,0.08);
    }
    .toggle-btn:hover:not(.active) {
      color: #555;
    }
    #stats {
      font-size: 10px;
      color: #999;
      letter-spacing: 0.02em;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="controls">
    <div>
      <h1>GCD Community Resources</h1>
      <div class="subtitle">What communities of practice are emerging?</div>
    </div>
    <div class="toggle-container">
      <button class="toggle-btn active" id="btn-pathways" onclick="switchMode('pathways')">GCD Platforms</button>
      <button class="toggle-btn" id="btn-units" onclick="switchMode('units')">Units</button>
      <button class="toggle-btn" id="btn-tags" onclick="switchMode('tags')">Tags</button>
    </div>
    <div id="stats"></div>
  </div>

  <script src="data_inline.js"></script>
  <script>
  // ─── GLOBALS ──────────────────────────────────────────────────
  let graphNodes, graphLinks, simulation;
  let currentMode = 'pathways';
  let hoveredNode = null;
  let connectedNodeIds = new Set();
  let panX = 0, panY = 0, zoomLevel = 1;
  let targetZoom = 1, targetPanX = 0, targetPanY = 0;
  const ZOOM_LERP = 0.12;
  let dragNode = null;
  let noiseTime = 0;
  const DRIFT_SPEED = 0.006;
  const DRIFT_AMOUNT = 5.0;
  const BREATHE_SPEED = 0.012;
  const BREATHE_AMOUNT = 0.12;
  const HOVER_LERP = 0.12;
  let lastMX = 0, lastMY = 0;
  let isPanning = false;
  let mouseWorldX = 0, mouseWorldY = 0;

  // Frame-rate independent lerp — keeps animations consistent
  // even when FPS drops (e.g. dense Tags view)
  function smoothLerp(current, target, rate) {
    const dt = min(deltaTime, 50) / 16.667;   // normalise to 60 fps
    const t = 1 - pow(1 - rate, dt);
    return current + (target - current) * t;
  }

  // ─── COLORS ───────────────────────────────────────────────────
  const pathwayColors = {};
  const unitColors = {};
  const tagColors = {};

  const palette = [
    '#9A3EDB', '#2DDBAD', '#DC38A9', '#8FDB30', '#8A446E',
    '#50375C', '#3DF45D', '#B86DD6', '#5BE8C4', '#E867BF',
    '#A8E85C', '#A66B8E', '#7B5A8A', '#6AF87D', '#C994E0',
    '#7EEFD6', '#EE8FD1', '#BEF07E', '#BF8AAB', '#9C79AB',
    '#89FCA0', '#D4B0E8', '#A3F5E3', '#F4ADE0', '#D2F59D',
    '#D4A6C4', '#B997C8', '#A8FEB8', '#DFC6EE', '#C6FAF0',
  ];

  function assignColors(items, colorMap) {
    items.forEach((item, i) => { colorMap[item] = palette[i % palette.length]; });
  }

  // ─── INIT ─────────────────────────────────────────────────────
  function initGraph() {
    const data = DATA;
    const posts = data.posts.filter(p =>
      p.tags.length > 0 || p.pathways.length > 0 || p.units.length > 0
    );

    // Group pathways by platform so P1/P2 variants share the same colour
    const platformColors = {
      'E&E': '#3B82F6',   // Sapphire — royal blue
      'I&S': '#7C3AED',   // Amethyst — deep violet
      'T&M': '#DB2777',   // Ruby — deep rose
      'S&I': '#059669',   // Emerald — forest green
      'N&V': '#D97706',   // Topaz — deep amber
    };
    const extraColors = { 'Core Reading': '#6B7280', 'Lectures & Debates': '#0D9488' };
    data.allPathways.forEach(p => {
      const match = Object.keys(platformColors).find(k => p.includes(k));
      pathwayColors[p] = match ? platformColors[match] : (extraColors[p] || '#6B3FA0');
    });
    assignColors(data.allUnits, unitColors);

    const tagCounts = {};
    posts.forEach(p => p.tags.forEach(t => { tagCounts[t] = (tagCounts[t] || 0) + 1; }));
    const topTags = Object.entries(tagCounts)
      .filter(([, c]) => c >= 4)
      .sort((a, b) => b[1] - a[1])
      .map(([t]) => t);
    // Tags get a greyscale palette — they represent overarching cohort interests
    topTags.forEach((t, i) => {
      const shade = 30 + (i % 8) * 18;   // range from #1E1E1E to #9C9C9C
      const hex = '#' + shade.toString(16).padStart(2, '0').repeat(3);
      tagColors[t] = hex;
    });

    buildGraph(data, posts, topTags);
    graphNodes.forEach((n, i) => { n.noiseSeedX = i * 100; n.noiseSeedY = i * 100 + 5000; n.displayAlpha = 130; n.displayRadius = n.radius; });
    setupSimulation();

    const postCount = graphNodes.filter(n => n.type === 'post').length;
    const tagCount = graphNodes.filter(n => n.type === 'tag').length;
    document.getElementById('stats').textContent =
      postCount + ' references \u2014 ' + tagCount + ' shared tags \u2014 ' +
      data.allUnits.length + ' units';
  }

  // ─── GRAPH BUILDING ───────────────────────────────────────────
  function buildGraph(data, posts, topTags) {
    graphNodes = [];
    graphLinks = [];
    const pathwayNodeMap = {}, unitNodeMap = {}, tagNodeMap = {};

    // Format pathway labels: "P2-T&M" → "U6 T&M #2"
    function fmtPathway(name) {
      const m = name.match(/^P([12])-?(.+)$/);
      return m ? ('U6 ' + m[2] + ' #' + m[1]) : name;
    }

    data.allPathways.forEach(p => {
      const id = 'pw-' + p;
      pathwayNodeMap[p] = id;
      graphNodes.push({ id, label: fmtPathway(p), type: 'pathway', radius: 18, color: pathwayColors[p], count: 0 });
    });

    data.allUnits.forEach(u => {
      const id = 'un-' + u;
      unitNodeMap[u] = id;
      graphNodes.push({ id, label: u, type: 'unit', radius: 20, color: unitColors[u], count: 0 });
    });

    topTags.forEach(t => {
      const id = 'tg-' + t;
      tagNodeMap[t] = id;
      graphNodes.push({ id, label: t, type: 'tag', radius: 6, color: tagColors[t], count: 0 });
    });

    posts.forEach(post => {
      // Post dots always use pathway colour; fallback to neutral grey
      let postColor = '#AAAAAA';
      if (post.pathways.length > 0) postColor = pathwayColors[post.pathways[0]] || '#AAAAAA';
      else if (post.units.length > 0) postColor = unitColors[post.units[0]] || '#AAAAAA';

      graphNodes.push({
        id: post.id, label: post.title, type: 'post', radius: 3,
        tags: post.tags, pathways: post.pathways, units: post.units,
        author: post.author, color: postColor,
      });

      post.pathways.forEach(p => {
        if (pathwayNodeMap[p]) {
          graphLinks.push({ source: post.id, target: pathwayNodeMap[p], type: 'pathway' });
          const hub = graphNodes.find(n => n.id === pathwayNodeMap[p]);
          if (hub) hub.count++;
        }
      });
      post.units.forEach(u => {
        if (unitNodeMap[u]) {
          graphLinks.push({ source: post.id, target: unitNodeMap[u], type: 'unit' });
          const hub = graphNodes.find(n => n.id === unitNodeMap[u]);
          if (hub) hub.count++;
        }
      });
      post.tags.forEach(t => {
        if (tagNodeMap[t]) {
          graphLinks.push({ source: post.id, target: tagNodeMap[t], type: 'tag' });
          const hub = graphNodes.find(n => n.id === tagNodeMap[t]);
          if (hub) hub.count++;
        }
      });
    });

    sizeNodes('tag', 5, 24);
    sizeNodes('pathway', 14, 32);
    sizeNodes('unit', 16, 36);
  }

  function sizeNodes(type, minR, maxR) {
    const subset = graphNodes.filter(n => n.type === type);
    const maxCount = Math.max(...subset.map(n => n.count), 1);
    subset.forEach(n => { n.radius = minR + (n.count / maxCount) * (maxR - minR); });
  }

  // ─── D3 SIMULATION ───────────────────────────────────────────

  // Custom force: gentle gravity toward cursor position
  function forceCursorGravity(strength) {
    let nodes;
    function force(alpha) {
      const RADIUS = 400;          // influence radius in world-space
      for (const node of nodes) {
        const dx = mouseWorldX - node.x;
        const dy = mouseWorldY - node.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < 1 || d > RADIUS) continue;
        const falloff = 1 - d / RADIUS;        // linear falloff
        const s = strength * alpha * falloff * falloff;   // quadratic ease
        node.vx += dx * s;
        node.vy += dy * s;
      }
    }
    force.initialize = function(_) { nodes = _; };
    return force;
  }

  function setupSimulation() {
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;

    simulation = d3.forceSimulation(graphNodes)
      .force('charge', d3.forceManyBody().strength(-4))
      .force('center', d3.forceCenter(cx, cy).strength(0.04))
      .force('collision', d3.forceCollide().radius(d => d.type === 'post' ? d.radius + 1 : d.radius + 14))
      .force('link', d3.forceLink([]).id(d => d.id).distance(35).strength(0.1))
      .force('x', d3.forceX(cx).strength(0.015))
      .force('y', d3.forceY(cy).strength(0.015))
      .force('cursor', forceCursorGravity(0.06))
      .alphaDecay(0.012)
      .velocityDecay(0.4);

    applyMode(currentMode);
  }

  function applyMode(mode) {
    const modeType = mode === 'pathways' ? 'pathway' : mode === 'units' ? 'unit' : 'tag';
    const active = graphLinks.filter(l => l.type === modeType);

    simulation.force('link')
      .links(active)
      .distance(d => {
        const s = typeof d.source === 'object' ? d.source : graphNodes.find(n => n.id === d.source);
        const t = typeof d.target === 'object' ? d.target : graphNodes.find(n => n.id === d.target);
        if (!s || !t) return 35;
        return 12 + s.radius + t.radius;
      })
      .strength(mode === 'tags' ? 0.1 : 0.18);

    simulation.force('charge').strength(d => {
      if (mode === 'pathways') return d.type === 'pathway' ? -250 : (d.type === 'post' ? -1.5 : -8);
      if (mode === 'units') return d.type === 'unit' ? -300 : (d.type === 'post' ? -1.5 : -8);
      return d.type === 'tag' ? -120 : (d.type === 'post' ? -1 : -8);
    });

    simulation.force('x').strength(mode === 'tags' ? 0.008 : 0.012);
    simulation.force('y').strength(mode === 'tags' ? 0.008 : 0.012);

    simulation.alpha(0.8).restart();
  }

  function switchMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + mode).classList.add('active');
    applyMode(mode);
  }

  // ─── P5.js RENDERING ─────────────────────────────────────────
  function setup() {
    createCanvas(windowWidth, windowHeight);
    textFont('Roboto');
    initGraph();
  }

  function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
    if (simulation) {
      simulation.force('center', d3.forceCenter(windowWidth / 2, windowHeight / 2));
      simulation.force('x', d3.forceX(windowWidth / 2));
      simulation.force('y', d3.forceY(windowHeight / 2));
      simulation.alpha(0.3).restart();
    }
  }

  function draw() {
    background(255, 255, 255);
    if (!graphNodes) return;

    noiseTime += DRIFT_SPEED;

    // Smooth zoom interpolation (Google Maps-like)
    zoomLevel = lerp(zoomLevel, targetZoom, ZOOM_LERP);
    panX = lerp(panX, targetPanX, ZOOM_LERP);
    panY = lerp(panY, targetPanY, ZOOM_LERP);

    push();
    translate(panX, panY);
    scale(zoomLevel);

    const modeType = currentMode === 'pathways' ? 'pathway' :
                     currentMode === 'units' ? 'unit' : 'tag';
    const activeLinks = graphLinks.filter(l => l.type === modeType);

    // Draw edges
    activeLinks.forEach(link => {
      const src = typeof link.source === 'object' ? link.source : null;
      const tgt = typeof link.target === 'object' ? link.target : null;
      if (!src || !tgt || src.x == null || tgt.x == null) return;

      const sdx = (noise(src.noiseSeedX + noiseTime) - 0.5) * DRIFT_AMOUNT * 2;
      const sdy = (noise(src.noiseSeedY + noiseTime) - 0.5) * DRIFT_AMOUNT * 2;
      const tdx = (noise(tgt.noiseSeedX + noiseTime) - 0.5) * DRIFT_AMOUNT * 2;
      const tdy = (noise(tgt.noiseSeedY + noiseTime) - 0.5) * DRIFT_AMOUNT * 2;

      const isHL = hoveredNode && (
        (src.id === hoveredNode.id && connectedNodeIds.has(tgt.id)) ||
        (tgt.id === hoveredNode.id && connectedNodeIds.has(src.id))
      );

      let targetLA, targetLW;
      let useColor = false;
      if (hoveredNode && !isHL) {
        targetLA = 8; targetLW = 0.2;
      } else if (isHL) {
        targetLA = 140; targetLW = 1.2; useColor = true;
      } else {
        targetLA = 18; targetLW = 0.3;
      }
      if (link.displayAlpha == null) { link.displayAlpha = 18; link.displayWeight = 0.3; }
      link.displayAlpha = smoothLerp(link.displayAlpha, targetLA, HOVER_LERP);
      link.displayWeight = smoothLerp(link.displayWeight, targetLW, HOVER_LERP);

      if (useColor && link.displayAlpha > 20) {
        const lc = color(tgt.color || src.color);
        lc.setAlpha(link.displayAlpha);
        stroke(lc);
      } else {
        stroke(0, 0, 0, link.displayAlpha);
      }
      strokeWeight(link.displayWeight);
      line(src.x + sdx, src.y + sdy, tgt.x + tdx, tgt.y + tdy);
    });

    // Helper: update node display state
    function updateNode(node) {
      const isHub = node.type !== 'post';
      const isActiveHub = isHub && node.type === modeType;

      node._dx = (noise(node.noiseSeedX + noiseTime) - 0.5) * DRIFT_AMOUNT * 2;
      node._dy = (noise(node.noiseSeedY + noiseTime) - 0.5) * DRIFT_AMOUNT * 2;
      const breathe = 1 + sin(noiseTime / DRIFT_SPEED * BREATHE_SPEED + node.noiseSeedX) * BREATHE_AMOUNT;

      const isHov = hoveredNode && hoveredNode.id === node.id;
      const isConn = hoveredNode && connectedNodeIds.has(node.id);
      const isDim = hoveredNode && !isConn && !isHov;

      const baseA = isActiveHub ? 255 : 130;
      const targetA = isDim ? 12 : (isHov ? 255 : (isConn ? 220 : baseA));
      node.displayAlpha = smoothLerp(node.displayAlpha, targetA, HOVER_LERP);

      const targetR = (isHov ? node.radius * 1.4 : node.radius) * breathe;
      node.displayRadius = smoothLerp(node.displayRadius, targetR, HOVER_LERP);
    }

    // Update all visible nodes
    graphNodes.forEach(node => {
      if (node.x == null) return;
      const isHub = node.type !== 'post';
      const isActiveHub = isHub && node.type === modeType;
      if (isHub && !isActiveHub) return;
      updateNode(node);
    });

    // Layer 1: Post dots (under edges for hubs)
    noStroke();
    graphNodes.forEach(node => {
      if (node.x == null || node.type !== 'post') return;
      const c = color(node.color);
      c.setAlpha(node.displayAlpha);
      fill(c);
      ellipse(node.x + node._dx, node.y + node._dy, node.displayRadius * 2, node.displayRadius * 2);
    });

    // Layer 2: Hub circles + labels (on top of everything)
    graphNodes.forEach(node => {
      if (node.x == null) return;
      const isHub = node.type !== 'post';
      const isActiveHub = isHub && node.type === modeType;
      if (!isActiveHub) return;

      const nx = node.x + node._dx;
      const ny = node.y + node._dy;
      const c = color(node.color);

      // Hub body — fully opaque so edges don't show through
      c.setAlpha(node.displayAlpha);
      noStroke();
      fill(c);
      ellipse(nx, ny, node.displayRadius * 2, node.displayRadius * 2);

      // Labels — name above, count in center
      if (node.displayAlpha > 20) {
        textAlign(CENTER, CENTER);

        // Label text above the circle
        fill(0, 0, 0, min(node.displayAlpha, hoveredNode && hoveredNode.id === node.id ? 255 : 180));
        const labelSize = max(9, node.displayRadius * 0.45);
        textSize(labelSize);
        textStyle(NORMAL);
        text(node.label, nx, ny - node.displayRadius - 10);

        // Count number in center (white) — use BASELINE alignment
        // and manually center using ascent, since digits have no descenders
        fill(255, 255, 255, min(node.displayAlpha, 240));
        const countSize = max(7, node.displayRadius * 0.35);
        textSize(countSize);
        textStyle(NORMAL);
        textAlign(CENTER, BASELINE);
        const digitHeight = textAscent();   // digits sit entirely above baseline
        text(node.count, nx, ny + digitHeight * 0.5);
        textAlign(CENTER, CENTER);          // restore for next iteration
      }
    });

    // Tooltip
    if (hoveredNode) drawTooltip(hoveredNode);

    pop();
  }

  function drawTooltip(node) {
    const tx = node.x + node.radius + 14;
    const ty = node.y - 12;

    const lines = [];
    if (node.type === 'post') {
      lines.push(node.label.length > 45 ? node.label.slice(0, 45) + '...' : node.label);
      if (node.tags.length) {
        const t = node.tags.slice(0, 6).join(', ');
        lines.push('Tags: ' + t + (node.tags.length > 6 ? '...' : ''));
      }
      if (node.pathways.length) lines.push('Pathways: ' + node.pathways.join(', '));
      if (node.units.length) lines.push('Units: ' + node.units.join(', '));
    } else {
      // Split multi-line labels into separate tooltip lines
      node.label.split('\n').forEach(part => lines.push(part));
      lines.push(node.count + ' references');

      // List connected post titles
      const modeType = currentMode === 'pathways' ? 'pathway' :
                       currentMode === 'units' ? 'unit' : 'tag';
      const connected = graphLinks
        .filter(l => l.type === modeType)
        .filter(l => {
          const sid = typeof l.source === 'object' ? l.source.id : l.source;
          const tid = typeof l.target === 'object' ? l.target.id : l.target;
          return sid === node.id || tid === node.id;
        })
        .map(l => {
          const sid = typeof l.source === 'object' ? l.source.id : l.source;
          const tid = typeof l.target === 'object' ? l.target.id : l.target;
          const postId = sid === node.id ? tid : sid;
          return graphNodes.find(n => n.id === postId);
        })
        .filter(n => n && n.type === 'post')
        .map(n => n.label.length > 40 ? n.label.slice(0, 40) + '...' : n.label);

      lines.push('');
      const maxItems = 15;
      connected.slice(0, maxItems).forEach(t => lines.push('· ' + t));
      if (connected.length > maxItems) lines.push('  + ' + (connected.length - maxItems) + ' more...');
    }

    textAlign(LEFT, TOP);
    const pad = 10;
    const lh = 14;
    let maxW = 0;
    lines.forEach((ln, i) => {
      textStyle(i === 0 ? BOLD : NORMAL);
      textSize(i === 0 ? 11 : 9);
      maxW = max(maxW, textWidth(ln));
    });
    const bw = maxW + pad * 2;
    const bh = lines.length * lh + pad * 2;

    // Keep tooltip on screen
    const worldRight = (windowWidth - panX) / zoomLevel;
    const worldBottom = (windowHeight - panY) / zoomLevel;
    let ttx = tx;
    let tty = ty;
    if (ttx + bw > worldRight) ttx = tx - bw - node.radius * 2 - 28;
    if (tty + bh > worldBottom) tty = worldBottom - bh - 4;

    fill(255, 255, 255, 245);
    stroke(0, 0, 0, 20);
    strokeWeight(1);
    rect(ttx, tty, bw, bh, 6);

    noStroke();
    lines.forEach((ln, i) => {
      fill(i === 0 ? 0 : 80);
      textStyle(i === 0 ? BOLD : NORMAL);
      textSize(i === 0 ? 11 : 9);
      text(ln, ttx + pad, tty + pad + i * lh);
    });
    textStyle(NORMAL);
  }

  // ─── INTERACTION ──────────────────────────────────────────────
  function screenToWorld(sx, sy) {
    return { x: (sx - panX) / zoomLevel, y: (sy - panY) / zoomLevel };
  }

  function findNodeAt(wx, wy) {
    let closest = null, best = Infinity;
    const modeType = currentMode === 'pathways' ? 'pathway' :
                     currentMode === 'units' ? 'unit' : 'tag';
    for (const n of graphNodes) {
      if (n.x == null) continue;
      if (n.type !== 'post' && n.type !== modeType) continue;
      const d = dist(wx, wy, n.x, n.y);
      // Generous hit radius for hubs so smaller circles are easy to hover
      const hr = n.type === 'post' ? max(n.radius, 6) : max(n.radius + 4, 12);
      if (d < hr && d < best) { closest = n; best = d; }
    }
    return closest;
  }

  function mouseMoved() {
    if (!graphNodes) return;
    const w = screenToWorld(mouseX, mouseY);
    mouseWorldX = w.x;
    mouseWorldY = w.y;
    // Keep simulation gently alive so cursor gravity has effect
    if (simulation.alpha() < 0.02) simulation.alpha(0.02).restart();
    hoveredNode = findNodeAt(w.x, w.y);

    connectedNodeIds.clear();
    if (hoveredNode) {
      connectedNodeIds.add(hoveredNode.id);
      const modeType = currentMode === 'pathways' ? 'pathway' :
                       currentMode === 'units' ? 'unit' : 'tag';
      graphLinks.filter(l => l.type === modeType).forEach(l => {
        const sid = typeof l.source === 'object' ? l.source.id : l.source;
        const tid = typeof l.target === 'object' ? l.target.id : l.target;
        if (sid === hoveredNode.id) connectedNodeIds.add(tid);
        if (tid === hoveredNode.id) connectedNodeIds.add(sid);
      });
    }
    cursor(hoveredNode ? 'pointer' : 'default');
  }

  function mousePressed() {
    if (!graphNodes) return;
    const w = screenToWorld(mouseX, mouseY);
    dragNode = findNodeAt(w.x, w.y);
    if (dragNode) {
      dragNode.fx = dragNode.x;
      dragNode.fy = dragNode.y;
      simulation.alphaTarget(0.1).restart();
    } else {
      isPanning = true;
    }
    lastMX = mouseX; lastMY = mouseY;
  }

  function mouseDragged() {
    if (dragNode) {
      const w = screenToWorld(mouseX, mouseY);
      dragNode.fx = w.x;
      dragNode.fy = w.y;
    } else if (isPanning) {
      targetPanX += mouseX - lastMX;
      targetPanY += mouseY - lastMY;
    }
    lastMX = mouseX; lastMY = mouseY;
  }

  function mouseReleased() {
    if (dragNode) {
      dragNode.fx = null;
      dragNode.fy = null;
      simulation.alphaTarget(0);
    }
    dragNode = null;
    isPanning = false;
  }

  function zoomAt(screenX, screenY, factor) {
    const wx = (screenX - targetPanX) / targetZoom;
    const wy = (screenY - targetPanY) / targetZoom;
    const nz = constrain(targetZoom * factor, 0.15, 5);
    targetPanX = screenX - wx * nz;
    targetPanY = screenY - wy * nz;
    targetZoom = nz;
  }

  function mouseWheel(event) {
    const factor = event.delta > 0 ? 0.92 : 1.08;
    zoomAt(mouseX, mouseY, factor);
    return false;
  }

  function keyPressed() {
    if (key === '=' || key === '+') {
      zoomAt(windowWidth / 2, windowHeight / 2, 1.15);
    } else if (key === '-' || key === '_') {
      zoomAt(windowWidth / 2, windowHeight / 2, 0.85);
    }
  }
  </script>
</body>
